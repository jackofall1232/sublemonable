# Optional Tor hidden service overlay:
#   docker compose -f docker-compose.yml -f docker-compose.tor.yml up -d
# Read your .onion address with:
#   docker compose exec tor cat /var/lib/tor/sublemonable/hostname

services:
  tor:
    build: ./tor
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - tor-data:/var/lib/tor

  server:
    # The clearnet 8443 publish inherited from docker-compose.yml is kept on
    # purpose: a hybrid box serves the API on clearnet (behind a reverse proxy)
    # while the hidden service serves the same port over Tor. The static mirror
    # is NOT exposed on clearnet — the server serves it only when the request
    # Host is ONION_ADDRESS (see registerOnionMirror in server/cmd/server);
    # ordinary clearnet / IP-scanner traffic falls through to the API. The hidden
    # service reaches the server over the internal compose network (tor ->
    # server:8443).
    environment:
      TOR_ENABLED: "true"
      # Serve the static no-JS mirror site (APK + checksums + self-hosting docs)
      # at the root of the hidden service.
      ONION_SITE_DIR: /srv/onion
    volumes:
      # Read-only mirror content. Docker Compose merges this with the base
      # service's volumes (the JWT keys mount), so both are present.
      - ./onion-site:/srv/onion:ro

volumes:
  tor-data:
