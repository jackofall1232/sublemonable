name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript — packages & web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build:packages
      - name: Test (Vitest)
        run: pnpm -r test
      - name: Build web app
        run: pnpm --filter @sublemonable/web build
      - name: Build website
        run: pnpm --filter @sublemonable/website build

  server:
    name: Go server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - run: go build ./...
      - name: Test (go test)
        run: go test -race ./...
      - name: gofmt check
        run: test -z "$(gofmt -l .)"

  android:
    name: Android — compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Validate Gradle project structure
        run: |
          test -f apps/android/settings.gradle.kts
          test -f apps/android/app/build.gradle.kts

  desktop-linux:
    name: Desktop — Linux build (.deb, .AppImage, .rpm)
    runs-on: ubuntu-22.04
    needs: [typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsecret-1-dev libgtk-3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build:packages
      - name: Build web frontend
        run: pnpm --filter @sublemonable/web build
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked
      - name: Build Linux bundles
        working-directory: apps/desktop
        run: cargo tauri build --bundles deb,appimage,rpm
      - uses: actions/upload-artifact@v4
        with:
          name: sublemonable-linux-packages
          path: apps/desktop/src-tauri/target/release/bundle/
          retention-days: 30

  security:
    name: Security scanning
    runs-on: ubuntu-latest
    needs: [desktop-linux]
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  docker:
    name: Server image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t sublemonable-server:ci ./server
