# tunnels.conf — i2pd server tunnel for the Sublemonable relay.
#
# This creates an I2P destination (*.b32.i2p address) and forwards inbound I2P
# connections to the Go server on server:8443.
#
# Key persistence: the destination key file (sublemonable-relay.dat) is stored
# in the i2p-data Docker volume. On first start i2pd generates a fresh key pair
# and derives a new B32 address from it. On subsequent starts it reuses the
# existing keys, preserving the address. Losing the volume means losing the B32
# address permanently — back up sublemonable-relay.dat alongside the Tor hidden
# service keys and the JWT signing keys.
#
# The B32 address is readable from the i2pd web console after tunnel build
# (allow 1-2 min after startup):
#   curl -s 'http://127.0.0.1:7070/?page=i2p_tunnels' | grep -oP '[a-z2-7]+\.b32\.i2p' | head -1

[sublemonable-relay]
type = http
host = server
port = 8443
keys = sublemonable-relay.dat
